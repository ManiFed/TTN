# Website service — thetelescope.net
# In Railway: Settings → Config file path = /railway.website.toml
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.website"
watchPatterns = [
  "website/**",
  "Dockerfile.website",
  "railway.website.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 10
restartPolicyType = "always"
