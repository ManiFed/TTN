aavso:
  audit_dir: aavso_submissions
  chart_id: ''
  observer_code: EGBA
  password: ${AAVSO_PASSWORD}
  submit_from_node: false
  submit_poor_quality: false
  username: ${AAVSO_USERNAME}
alpaca:
  api_version: 1
  default_server:
    address: 172.22.6.32
    port: 32323
  discovery_port: 32227
  discovery_timeout: 5
autofocus:
  exposure_s: 2
  max_position: null
  min_position: null
  samples_per_point: 1
  settle_s: 1
  step_size: 50
  steps_per_side: 5
camera:
  binning: 1
  exposure_duration: 30
centering:
  exposure_s: 3
  max_iterations: 4
  settle_s: 2
  tolerance_arcmin: 3
cloud:
  activation_code: BS-2026-NM7SB91F
  api_key: ''
  auto_run_plans: false
  enabled: true
  heartbeat_interval: 60
  node_id: ''
  plan_poll_interval: 300
  upload_images: false
  url: https://api.thetelescope.net
devices:
  camera:
    device_number: 0
    enabled: true
  covercalibrator:
    device_number: 0
    enabled: true
  filterwheel:
    device_number: 0
    enabled: false
  focuser:
    device_number: 0
    enabled: false
  telescope:
    device_number: 0
    enabled: true
image_watcher:
  debounce_delay: 2
  enabled: false
  watch_path: /mnt/seestar
logging:
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
  level: INFO
observatory:
  elevation: 525
  instrument: ZWO Seestar S50 IMX462
  latitude: 31.3614
  longitude: -99.4431
  name: Starfront Observatories, Rockwood TX
  observer: ''
  telescope: ZWO Seestar S50
photometry:
  annulus_inner: 4
  annulus_outer: 6
  aperture_factor: 1.5
  astap_path: astap
  astap_search_radius: 10
  comparison_catalogs:
  - aavso
  - apass
  - gaia
  comparison_target_count: 8
  enabled: true
  field_radius: 0.5
  filter_name: CV
  fits_export:
    enabled: true
    export_dir: fits_export
  force_plate_solve: true
  fwhm_fallback_px: 4.01
  gain: 1
  mag_limit: 15
  mag_min: 10
  max_airmass: 3
  max_exposure_s: 30
  max_uncertainty: 0.3
  min_comparison_stars: 3
  node_id: seestar-live-001
  pixel_scale: 2.4
  read_noise: 5
  snr_threshold: 20
  solve_field_path: /opt/homebrew/bin/solve-field
  solver: astrometry
  target:
    dec_deg: null
    name: ''
    ra_deg: null
pier_cam:
  bin: 2
  device_index: 0
  enabled: false
  exposure_ms: 80
  gain: 200
  jpeg_quality: 75
  sdk_lib: ''
  target_fps: 10
aavso:
  observer_code: 'EGBA'
  # Secrets are read from the environment — never commit them here.
  username: '${AAVSO_USERNAME}'
  password: '${AAVSO_PASSWORD}'
  audit_dir: aavso_submissions
  # When the cloud is enabled it owns AAVSO submission (network batch under one
  # OBSCODE). The node then only formats + saves the file for audit and uploads
  # it to the cloud — it does NOT POST to WebObs, so observations aren't sent
  # twice. Set submit_from_node: true only for a standalone node with no cloud.
  submit_from_node: false
  submit_poor_quality: false
  chart_id: ''
cloud:
  enabled: true
  url: 'https://api.thetelescope.net'
  activation_code: ''          # BS-YYYY-XXXXXXXX from your account page; used once on first boot
  node_id: ''
  api_key: ''
  heartbeat_interval: 60       # seconds between heartbeats (with conditions)
  plan_poll_interval: 300      # seconds between observation-plan polls
  auto_run_plans: false        # execute cloud plans automatically when idle
  upload_images: false         # also upload raw FITS after each measurement
safety:
  dawn_type: astronomical
  disconnect_timeout: 600
  enabled: true
  heartbeat_interval: 30
  observer:
    latitude: 31.3614
    longitude: -99.4431
  park_at_dawn: true
  reconnect_attempts: 3
  reconnect_delay: 10
stacking:
  exposure_s: 10
  frames: 20
  preview_every: 1
telescope:
  slew_dec: 80.2692
  slew_ra: 23.6833
  tracking_rate: 0
