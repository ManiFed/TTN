app = "boundless-skies-cloud"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.cloud"

[env]
  PORT = "8800"

[http_service]
  internal_port = 8800
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# No volume needed — database is PostgreSQL (Railway/Fly managed service)
