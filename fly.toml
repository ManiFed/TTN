app = "boundless-skies-cloud"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.cloud"

[env]
  PORT = "8800"

[http_service]
  internal_port = 8800
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "cloud_data"
  destination = "/data"
